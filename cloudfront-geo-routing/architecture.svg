<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <rect width="1200" height="700" fill="#0D1117"/>
  
  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" fill="#58A6FF" font-size="20" font-weight="bold">CloudFront Geo-Routing with Automated Failover</text>

  <!-- Viewers -->
  <g transform="translate(30, 100)">
    <rect x="0" y="0" width="110" height="50" rx="8" fill="#1F2937" stroke="#3FB950" stroke-width="2"/>
    <text x="55" y="22" text-anchor="middle" fill="#C9D1D9" font-size="11">🇺🇸 Americas</text>
    <text x="55" y="40" text-anchor="middle" fill="#8B949E" font-size="10">Viewers</text>
  </g>
  <g transform="translate(30, 270)">
    <rect x="0" y="0" width="110" height="50" rx="8" fill="#1F2937" stroke="#58A6FF" stroke-width="2"/>
    <text x="55" y="22" text-anchor="middle" fill="#C9D1D9" font-size="11">🇪🇺 EMEA</text>
    <text x="55" y="40" text-anchor="middle" fill="#8B949E" font-size="10">Viewers</text>
  </g>
  <g transform="translate(30, 440)">
    <rect x="0" y="0" width="110" height="50" rx="8" fill="#1F2937" stroke="#D29922" stroke-width="2"/>
    <text x="55" y="22" text-anchor="middle" fill="#C9D1D9" font-size="11">🇯🇵 APAC</text>
    <text x="55" y="40" text-anchor="middle" fill="#8B949E" font-size="10">Viewers</text>
  </g>

  <!-- Arrows: Viewers to CloudFront -->
  <line x1="140" y1="125" x2="250" y2="290" stroke="#3FB950" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="140" y1="295" x2="250" y2="300" stroke="#58A6FF" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="140" y1="465" x2="250" y2="310" stroke="#D29922" stroke-width="2" marker-end="url(#arrow-yellow)"/>

  <!-- CloudFront -->
  <g transform="translate(250, 260)">
    <rect x="0" y="0" width="130" height="80" rx="10" fill="#1F2937" stroke="#8C4FFF" stroke-width="2"/>
    <text x="65" y="30" text-anchor="middle" fill="#8C4FFF" font-size="12" font-weight="bold">CloudFront</text>
    <text x="65" y="50" text-anchor="middle" fill="#C9D1D9" font-size="10">Distribution</text>
    <text x="65" y="68" text-anchor="middle" fill="#8B949E" font-size="9">(3 origins configured)</text>
  </g>

  <!-- CF Function + KVS box -->
  <g transform="translate(260, 380)">
    <rect x="0" y="0" width="250" height="90" rx="8" fill="none" stroke="#30363D" stroke-width="1" stroke-dasharray="4"/>
    <text x="125" y="18" text-anchor="middle" fill="#8B949E" font-size="9">Edge Logic (sub-ms)</text>
    <rect x="10" y="28" width="110" height="50" rx="6" fill="#1F2937" stroke="#58A6FF" stroke-width="1.5"/>
    <text x="65" y="50" text-anchor="middle" fill="#58A6FF" font-size="10" font-weight="bold">CF Function</text>
    <text x="65" y="66" text-anchor="middle" fill="#8B949E" font-size="9">viewer-request</text>
    <rect x="130" y="28" width="110" height="50" rx="6" fill="#1F2937" stroke="#D29922" stroke-width="1.5"/>
    <text x="185" y="50" text-anchor="middle" fill="#D29922" font-size="10" font-weight="bold">KVS</text>
    <text x="185" y="66" text-anchor="middle" fill="#8B949E" font-size="9">domains + flags</text>
  </g>

  <!-- Arrow CF to CF Function -->
  <path d="M315 340 L315 380" stroke="#58A6FF" stroke-width="1.5" stroke-dasharray="4" fill="none" marker-end="url(#arrow-blue)"/>
  <!-- Arrow CF Function to KVS -->
  <line x1="380" y1="430" x2="390" y2="430" stroke="#D29922" stroke-width="1.5" stroke-dasharray="3"/>

  <!-- Origins -->
  <g transform="translate(560, 100)">
    <rect x="0" y="0" width="130" height="55" rx="8" fill="#1F2937" stroke="#3FB950" stroke-width="2"/>
    <text x="65" y="22" text-anchor="middle" fill="#3FB950" font-size="11" font-weight="bold">Origin 0</text>
    <text x="65" y="38" text-anchor="middle" fill="#C9D1D9" font-size="10">Americas (us-east-1)</text>
    <text x="65" y="50" text-anchor="middle" fill="#8B949E" font-size="9">API GW + Lambda</text>
  </g>
  <g transform="translate(560, 270)">
    <rect x="0" y="0" width="130" height="55" rx="8" fill="#1F2937" stroke="#58A6FF" stroke-width="2"/>
    <text x="65" y="22" text-anchor="middle" fill="#58A6FF" font-size="11" font-weight="bold">Origin 1</text>
    <text x="65" y="38" text-anchor="middle" fill="#C9D1D9" font-size="10">EMEA (eu-west-1)</text>
    <text x="65" y="50" text-anchor="middle" fill="#8B949E" font-size="9">API GW + Lambda</text>
  </g>
  <g transform="translate(560, 440)">
    <rect x="0" y="0" width="130" height="55" rx="8" fill="#1F2937" stroke="#D29922" stroke-width="2"/>
    <text x="65" y="22" text-anchor="middle" fill="#D29922" font-size="11" font-weight="bold">Origin 2</text>
    <text x="65" y="38" text-anchor="middle" fill="#C9D1D9" font-size="10">APAC (ap-northeast-1)</text>
    <text x="65" y="50" text-anchor="middle" fill="#8B949E" font-size="9">API GW + Lambda</text>
  </g>

  <!-- Arrows: CF to Origins -->
  <path d="M380 280 L560 130" stroke="#3FB950" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <line x1="380" y1="300" x2="560" y2="297" stroke="#58A6FF" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M380 320 L560 462" stroke="#D29922" stroke-width="2" fill="none" marker-end="url(#arrow-yellow)"/>
  
  <text x="470" y="220" text-anchor="middle" fill="#8B949E" font-size="9" transform="rotate(-25, 470, 220)">updateRequestOrigin()</text>

  <!-- Health Check Section -->
  <rect x="750" y="80" width="430" height="560" rx="10" fill="none" stroke="#30363D" stroke-width="2" stroke-dasharray="6"/>
  <text x="770" y="105" fill="#DA3633" font-size="13" font-weight="bold">⚡ Automated Health Check &amp; Failover</text>

  <!-- Canaries -->
  <g transform="translate(780, 130)">
    <rect x="0" y="0" width="120" height="45" rx="6" fill="#1F2937" stroke="#3FB950" stroke-width="1.5"/>
    <text x="60" y="18" text-anchor="middle" fill="#3FB950" font-size="10">🔍 Canary 0</text>
    <text x="60" y="35" text-anchor="middle" fill="#8B949E" font-size="9">every 60s → /health</text>
  </g>
  <g transform="translate(780, 280)">
    <rect x="0" y="0" width="120" height="45" rx="6" fill="#1F2937" stroke="#58A6FF" stroke-width="1.5"/>
    <text x="60" y="18" text-anchor="middle" fill="#58A6FF" font-size="10">🔍 Canary 1</text>
    <text x="60" y="35" text-anchor="middle" fill="#8B949E" font-size="9">every 60s → /health</text>
  </g>
  <g transform="translate(780, 430)">
    <rect x="0" y="0" width="120" height="45" rx="6" fill="#1F2937" stroke="#D29922" stroke-width="1.5"/>
    <text x="60" y="18" text-anchor="middle" fill="#D29922" font-size="10">🔍 Canary 2</text>
    <text x="60" y="35" text-anchor="middle" fill="#8B949E" font-size="9">every 60s → /health</text>
  </g>

  <!-- Arrows: Canaries back to Origins -->
  <line x1="780" y1="152" x2="690" y2="135" stroke="#3FB950" stroke-width="1" stroke-dasharray="4" marker-end="url(#arrow-green)"/>
  <line x1="780" y1="302" x2="690" y2="300" stroke="#58A6FF" stroke-width="1" stroke-dasharray="4" marker-end="url(#arrow-blue)"/>
  <line x1="780" y1="452" x2="690" y2="465" stroke="#D29922" stroke-width="1" stroke-dasharray="4" marker-end="url(#arrow-yellow)"/>

  <!-- CloudWatch Alarm -->
  <g transform="translate(950, 265)">
    <rect x="0" y="0" width="110" height="60" rx="8" fill="#1F2937" stroke="#DA3633" stroke-width="2"/>
    <text x="55" y="22" text-anchor="middle" fill="#DA3633" font-size="10" font-weight="bold">CloudWatch</text>
    <text x="55" y="38" text-anchor="middle" fill="#DA3633" font-size="10" font-weight="bold">Alarm</text>
    <text x="55" y="52" text-anchor="middle" fill="#8B949E" font-size="9">3/3 failures</text>
  </g>

  <!-- Arrows: Canaries to Alarm -->
  <line x1="900" y1="175" x2="970" y2="265" stroke="#8B949E" stroke-width="1.5" marker-end="url(#arrow-grey)"/>
  <line x1="900" y1="302" x2="950" y2="295" stroke="#8B949E" stroke-width="1.5" marker-end="url(#arrow-grey)"/>
  <line x1="900" y1="430" x2="970" y2="325" stroke="#8B949E" stroke-width="1.5" marker-end="url(#arrow-grey)"/>
  <text x="930" y="240" fill="#8B949E" font-size="9">metrics</text>

  <!-- SNS -->
  <g transform="translate(970, 380)">
    <rect x="0" y="0" width="80" height="40" rx="6" fill="#1F2937" stroke="#E7157B" stroke-width="1.5"/>
    <text x="40" y="25" text-anchor="middle" fill="#E7157B" font-size="10" font-weight="bold">SNS</text>
  </g>

  <!-- Arrow: Alarm to SNS -->
  <line x1="1005" y1="325" x2="1010" y2="380" stroke="#DA3633" stroke-width="2" marker-end="url(#arrow-red)"/>

  <!-- Failover Lambda -->
  <g transform="translate(970, 470)">
    <rect x="0" y="0" width="110" height="50" rx="8" fill="#1F2937" stroke="#ED7100" stroke-width="2"/>
    <text x="55" y="22" text-anchor="middle" fill="#ED7100" font-size="10" font-weight="bold">Failover λ</text>
    <text x="55" y="40" text-anchor="middle" fill="#8B949E" font-size="9">updates KVS</text>
  </g>

  <!-- Arrow: SNS to Lambda -->
  <line x1="1010" y1="420" x2="1020" y2="470" stroke="#DA3633" stroke-width="2" marker-end="url(#arrow-red)"/>

  <!-- Arrow: Lambda back to KVS (the failover path) -->
  <path d="M970 495 L520 495 L460 470" stroke="#DA3633" stroke-width="2" stroke-dasharray="6" fill="none" marker-end="url(#arrow-red)"/>
  <text x="700" y="488" fill="#DA3633" font-size="10" font-weight="bold">enabled = false</text>

  <!-- Legend -->
  <g transform="translate(30, 590)">
    <rect x="0" y="0" width="350" height="80" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1"/>
    <text x="15" y="20" fill="#8B949E" font-size="10" font-weight="bold">Legend</text>
    <line x1="15" y1="35" x2="45" y2="35" stroke="#3FB950" stroke-width="2"/>
    <text x="50" y="39" fill="#C9D1D9" font-size="9">Americas traffic (Origin 0)</text>
    <line x1="15" y1="50" x2="45" y2="50" stroke="#58A6FF" stroke-width="2"/>
    <text x="50" y="54" fill="#C9D1D9" font-size="9">EMEA traffic (Origin 1)</text>
    <line x1="15" y1="65" x2="45" y2="65" stroke="#D29922" stroke-width="2"/>
    <text x="50" y="69" fill="#C9D1D9" font-size="9">APAC traffic (Origin 2)</text>
    <line x1="190" y1="35" x2="220" y2="35" stroke="#DA3633" stroke-width="2" stroke-dasharray="4"/>
    <text x="225" y="39" fill="#C9D1D9" font-size="9">Failover path</text>
    <line x1="190" y1="50" x2="220" y2="50" stroke="#8B949E" stroke-width="1.5"/>
    <text x="225" y="54" fill="#C9D1D9" font-size="9">Health metrics</text>
  </g>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3FB950"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#58A6FF"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#D29922"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#DA3633"/>
    </marker>
    <marker id="arrow-grey" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8B949E"/>
    </marker>
  </defs>
</svg>
