AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFront Geo-Based Origin Routing with Automated Health Checks.
  Single self-contained stack: CloudFront distribution, CF Function, KVS,
  origin Lambdas, Synthetics canaries, CloudWatch alarms, and automated failover.

Parameters:
  ProjectName:
    Type: String
    Default: geo-routing-demo
    Description: Prefix for all resource names
  CanaryEvaluationPeriod:
    Type: Number
    Default: 60
    Description: Alarm evaluation period in seconds
  AlertEmail:
    Type: String
    Default: ''
    Description: Email for failover notifications (optional)

Conditions:
  HasAlertEmail: !Not [!Equals [!Ref AlertEmail, '']]

Resources:

  # ═══════════════════════════════════════════════════════════════════════════════
  # S3 + SNS
  # ═══════════════════════════════════════════════════════════════════════════════

  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${ProjectName}-alerts'

  AlertSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasAlertEmail
    Properties:
      TopicArn: !Ref AlertTopic
      Protocol: email
      Endpoint: !Ref AlertEmail

  CanaryArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-canary-artifacts-${AWS::AccountId}'
      LifecycleConfiguration:
        Rules:
          - Id: expire-immediately
            Status: Enabled
            ExpirationInDays: 1
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ═══════════════════════════════════════════════════════════════════════════════
  # CloudFront Key Value Store
  # ═══════════════════════════════════════════════════════════════════════════════
  RoutingKVS:
    Type: AWS::CloudFront::KeyValueStore
    Properties:
      Name: !Sub '${ProjectName}-routing-kvs'
      Comment: Origin routing config and health state

  # ═══════════════════════════════════════════════════════════════════════════════
  # Origin Lambdas (x3) — simulate regional backends
  # ═══════════════════════════════════════════════════════════════════════════════
  OriginLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-origin-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: logs-and-ssm
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
                Resource: '*'
              - Effect: Allow
                Action: ssm:GetParameter
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/geo-routing/*'

  Origin0Function:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-origin-0'
      Runtime: nodejs20.x
      Architectures: [arm64]
      Handler: index.handler
      Role: !GetAtt OriginLambdaRole.Arn
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          ORIGIN_ID: '0'
      Code:
        ZipFile: |
          const { SSMClient, GetParameterCommand } = require("@aws-sdk/client-ssm");
          const ssm = new SSMClient({});
          const originId = process.env.ORIGIN_ID;
          exports.handler = async (event) => {
            const path = event.rawPath || '/';
            const headers = event.headers || {};
            if (path === '/health') {
              let healthy = true;
              try {
                const p = await ssm.send(new GetParameterCommand({ Name: `/geo-routing/origin-${originId}-healthy` }));
                healthy = p.Parameter.Value !== 'false';
              } catch(e) {}
              return { statusCode: healthy ? 200 : 503, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ originId, healthy, ts: new Date().toISOString() }) };
            }
            return { statusCode: 200, headers: { 'Content-Type': 'application/json', 'X-Origin-ID': originId, 'Access-Control-Allow-Origin': '*', 'Access-Control-Expose-Headers': 'X-Origin-ID' }, body: JSON.stringify({ originId, region: headers['x-routed-region'] || 'unknown', country: headers['x-viewer-country-resolved'] || 'unknown', ts: new Date().toISOString() }) };
          };

  Origin1Function:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-origin-1'
      Runtime: nodejs20.x
      Architectures: [arm64]
      Handler: index.handler
      Role: !GetAtt OriginLambdaRole.Arn
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          ORIGIN_ID: '1'
      Code:
        ZipFile: |
          const { SSMClient, GetParameterCommand } = require("@aws-sdk/client-ssm");
          const ssm = new SSMClient({});
          const originId = process.env.ORIGIN_ID;
          exports.handler = async (event) => {
            const path = event.rawPath || '/';
            const headers = event.headers || {};
            if (path === '/health') {
              let healthy = true;
              try {
                const p = await ssm.send(new GetParameterCommand({ Name: `/geo-routing/origin-${originId}-healthy` }));
                healthy = p.Parameter.Value !== 'false';
              } catch(e) {}
              return { statusCode: healthy ? 200 : 503, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ originId, healthy, ts: new Date().toISOString() }) };
            }
            return { statusCode: 200, headers: { 'Content-Type': 'application/json', 'X-Origin-ID': originId, 'Access-Control-Allow-Origin': '*', 'Access-Control-Expose-Headers': 'X-Origin-ID' }, body: JSON.stringify({ originId, region: headers['x-routed-region'] || 'unknown', country: headers['x-viewer-country-resolved'] || 'unknown', ts: new Date().toISOString() }) };
          };

  Origin2Function:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-origin-2'
      Runtime: nodejs20.x
      Architectures: [arm64]
      Handler: index.handler
      Role: !GetAtt OriginLambdaRole.Arn
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          ORIGIN_ID: '2'
      Code:
        ZipFile: |
          const { SSMClient, GetParameterCommand } = require("@aws-sdk/client-ssm");
          const ssm = new SSMClient({});
          const originId = process.env.ORIGIN_ID;
          exports.handler = async (event) => {
            const path = event.rawPath || '/';
            const headers = event.headers || {};
            if (path === '/health') {
              let healthy = true;
              try {
                const p = await ssm.send(new GetParameterCommand({ Name: `/geo-routing/origin-${originId}-healthy` }));
                healthy = p.Parameter.Value !== 'false';
              } catch(e) {}
              return { statusCode: healthy ? 200 : 503, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ originId, healthy, ts: new Date().toISOString() }) };
            }
            return { statusCode: 200, headers: { 'Content-Type': 'application/json', 'X-Origin-ID': originId, 'Access-Control-Allow-Origin': '*', 'Access-Control-Expose-Headers': 'X-Origin-ID' }, body: JSON.stringify({ originId, region: headers['x-routed-region'] || 'unknown', country: headers['x-viewer-country-resolved'] || 'unknown', ts: new Date().toISOString() }) };
          };

  # SSM Parameters for health simulation
  Origin0HealthParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /geo-routing/origin-0-healthy
      Type: String
      Value: 'true'

  Origin1HealthParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /geo-routing/origin-1-healthy
      Type: String
      Value: 'true'

  Origin2HealthParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /geo-routing/origin-2-healthy
      Type: String
      Value: 'true'

  # ═══════════════════════════════════════════════════════════════════════════════
  # Origin API Gateways (×3) — one per origin, used as CloudFront origins
  # ═══════════════════════════════════════════════════════════════════════════════
  OriginApi0:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${ProjectName}-origin-api-0'
      ProtocolType: HTTP

  OriginApi0Stage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref OriginApi0
      StageName: '$default'
      AutoDeploy: true

  OriginApi0Integration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref OriginApi0
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt Origin0Function.Arn
      PayloadFormatVersion: '2.0'

  OriginApi0Route:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref OriginApi0
      RouteKey: '$default'
      Target: !Sub 'integrations/${OriginApi0Integration}'

  OriginApi0Permission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref Origin0Function
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${OriginApi0}/*'

  OriginApi1:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${ProjectName}-origin-api-1'
      ProtocolType: HTTP

  OriginApi1Stage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref OriginApi1
      StageName: '$default'
      AutoDeploy: true

  OriginApi1Integration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref OriginApi1
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt Origin1Function.Arn
      PayloadFormatVersion: '2.0'

  OriginApi1Route:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref OriginApi1
      RouteKey: '$default'
      Target: !Sub 'integrations/${OriginApi1Integration}'

  OriginApi1Permission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref Origin1Function
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${OriginApi1}/*'

  OriginApi2:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${ProjectName}-origin-api-2'
      ProtocolType: HTTP

  OriginApi2Stage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref OriginApi2
      StageName: '$default'
      AutoDeploy: true

  OriginApi2Integration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref OriginApi2
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt Origin2Function.Arn
      PayloadFormatVersion: '2.0'

  OriginApi2Route:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref OriginApi2
      RouteKey: '$default'
      Target: !Sub 'integrations/${OriginApi2Integration}'

  OriginApi2Permission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref Origin2Function
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${OriginApi2}/*'


  TestPageFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-test-page'
      Runtime: nodejs20.x
      Architectures: [arm64]
      Handler: index.handler
      Role: !GetAtt OriginLambdaRole.Arn
      Timeout: 5
      MemorySize: 128
      Environment:
        Variables:
          CF_DOMAIN: !GetAtt GeoRoutingDistribution.DomainName
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const cfDomain = process.env.CF_DOMAIN;
            const html = `<!DOCTYPE html>
          <html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
          <title>Geo-Routing Test</title>
          <style>
          *{margin:0;padding:0;box-sizing:border-box}
          body{font-family:-apple-system,sans-serif;background:#0d1117;color:#c9d1d9;padding:20px;min-height:100vh}
          .container{max-width:900px;margin:0 auto}
          h1{color:#58a6ff;margin-bottom:8px}
          .sub{color:#8b949e;margin-bottom:20px}
          .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
          .card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px}
          .card h3{color:#58a6ff;font-size:13px;text-transform:uppercase;margin-bottom:10px}
          button{background:#238636;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;margin:4px}
          button:hover{background:#2ea043}
          button.danger{background:#da3633}
          button.secondary{background:#30363d;color:#c9d1d9}
          select,input{background:#0d1117;color:#c9d1d9;border:1px solid #30363d;padding:8px;border-radius:6px;font-size:13px}
          #log{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:12px;font-family:monospace;font-size:12px;max-height:400px;overflow-y:auto;white-space:pre-wrap}
          .stat{display:inline-block;background:#30363d;padding:4px 10px;border-radius:4px;margin:4px;font-size:12px}
          .origin-0{border-left:3px solid #3fb950}.origin-1{border-left:3px solid #58a6ff}.origin-2{border-left:3px solid #d29922}
          </style></head><body>
          <div class="container">
          <h1>CloudFront Geo-Routing Demo</h1>
          <p class="sub">Dynamic origin selection with automated failover</p>
          <div class="grid">
          <div class="card"><h3>Send Requests</h3>
          <div>Country: <select id="country">
          <option value="">Auto (real IP)</option>
          <option value="US">US - Americas</option>
          <option value="IL">IL - EMEA</option>
          <option value="JP">JP - APAC</option>
          <option value="GB">GB - EMEA</option>
          <option value="AU">AU - APAC</option>
          <option value="BR">BR - Americas</option>
          </select></div><br>
          <button onclick="send(1)">Send 1</button>
          <button onclick="send(10)">Burst 10</button>
          <button onclick="send(100)">Burst 100</button>
          <button class="secondary" onclick="clearLog()">Clear</button>
          </div>
          <div class="card"><h3>Stats</h3>
          <div id="stats">No requests yet</div>
          </div>
          </div>
          <div class="card"><h3>Request Log</h3><div id="log"></div></div>
          </div>
          <script>
          const base = 'https://${cfDomain}';
          let counts = {0:0,1:0,2:0,err:0};
          function updateStats(){
            document.getElementById('stats').innerHTML =
              '<span class="stat origin-0">Origin 0: '+counts[0]+'</span>'+
              '<span class="stat origin-1">Origin 1: '+counts[1]+'</span>'+
              '<span class="stat origin-2">Origin 2: '+counts[2]+'</span>'+
              '<span class="stat">Errors: '+counts.err+'</span>';
          }
          function log(msg){document.getElementById('log').textContent += msg+'\n';document.getElementById('log').scrollTop=99999}
          async function send(n){
            const cc = document.getElementById('country').value;
            const headers = cc ? {'x-viewer-country': cc} : {};
            for(let i=0;i<n;i++){
              try{
                const r = await fetch(base+'/?t='+Date.now()+Math.random(), {headers});
                const d = await r.json();
                counts[d.originId]++;
                log((cc||'auto')+' → Origin '+d.originId+' ('+d.ts+')');
              }catch(e){counts.err++;log('ERROR: '+e.message)}
            }
            updateStats();
          }
          function clearLog(){document.getElementById('log').textContent='';counts={0:0,1:0,2:0,err:0};updateStats()}
          </script></body></html>`;
            return { statusCode: 200, headers: { 'Content-Type': 'text/html', 'Cache-Control': 'no-cache' }, body: html };
          };

  TestPageIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref OriginApi0
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt TestPageFunction.Arn
      PayloadFormatVersion: '2.0'

  TestPageRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref OriginApi0
      RouteKey: GET /test
      Target: !Sub 'integrations/${TestPageIntegration}'

  TestPagePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TestPageFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${OriginApi0}/*'

  # ═══════════════════════════════════════════════════════════════════════════════
  # CloudFront Function + Distribution
  # ═══════════════════════════════════════════════════════════════════════════════

  GeoRoutingFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub '${ProjectName}-viewer-request'
      AutoPublish: true
      FunctionConfig:
        Comment: Geo-based origin routing with KVS
        Runtime: cloudfront-js-2.0
        KeyValueStoreAssociations:
          - KeyValueStoreARN: !GetAtt RoutingKVS.Arn
      FunctionCode: |
        import cf from 'cloudfront';
        const kvsHandle = cf.kvs();
        const AMERICAS = ['US','CA','MX','BR','AR','CL','CO','PE','VE','EC','BO','PY','UY','GY','SR','PA','CR','NI','HN','SV','GT','BZ','CU','JM','HT','DO','PR','TT','BB','BS','AG','DM','GD','KN','LC','VC','AW','CW','SX'];
        const EMEA = ['GB','DE','FR','IT','ES','NL','BE','AT','CH','SE','NO','DK','FI','IE','PT','PL','CZ','RO','HU','GR','BG','HR','SK','SI','LT','LV','EE','LU','MT','CY','IL','AE','SA','QA','BH','KW','OM','JO','LB','IQ','IR','TR','EG','ZA','NG','KE','GH','TZ','ET','MA','TN','DZ','LY','SN','CI','CM','UG','AO','MZ','MG','RW','UA','RS','BA','ME','MK','AL','MD','GE','AM','AZ'];
        const APAC = ['CN','JP','KR','IN','AU','NZ','SG','MY','TH','ID','PH','VN','TW','HK','MO','BD','PK','LK','NP','MM','KH','LA','BN','MN','FJ','PG','WS','TO','MV','AF','KZ','UZ','TM','KG','TJ'];
        function getOrigin(cc) { if (AMERICAS.includes(cc)) return '0'; if (EMEA.includes(cc)) return '1'; if (APAC.includes(cc)) return '2'; return null; }
        async function getKvs(key) { try { return await kvsHandle.get(key, { format: 'string' }); } catch(e) { return null; } }
        async function handler(event) {
          const request = event.request;
          const cc = ((request.headers['x-viewer-country'] || {}).value || (request.headers['cloudfront-viewer-country'] || {}).value || '').toUpperCase();
          let originId = getOrigin(cc);
          let fallback = null;
          if (originId) { const e = await getKvs('origin_' + originId + '_enabled'); if (e === 'false') { fallback = 'origin_' + originId + '_maintenance'; originId = null; } }
          else { fallback = 'unmapped_' + (cc || 'UNKNOWN'); }
          if (!originId) { originId = '0'; if (fallback) console.log(JSON.stringify({ event: 'geo_routing_fallback', reason: fallback, country: cc })); }
          const domain = await getKvs('origin_' + originId + '_domain');
          if (domain) { cf.updateRequestOrigin({ domainName: domain, originId: 'origin-' + originId }); }
          request.headers['x-routed-origin'] = { value: originId };
          request.headers['x-routed-region'] = { value: originId };
          request.headers['x-viewer-country-resolved'] = { value: cc || 'UNKNOWN' };
          return request;
        }


  GeoRoutingDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub '${ProjectName} - Geo-routed with automated failover'
        PriceClass: PriceClass_100
        HttpVersion: http2and3
        CacheBehaviors:
          - PathPattern: /test
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD]
            CachedMethods: [GET, HEAD]
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            TargetOriginId: origin-0
        DefaultCacheBehavior:
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
          TargetOriginId: origin-0
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt GeoRoutingFunction.FunctionARN
        Origins:
          - Id: origin-0
            DomainName: !Sub '${OriginApi0}.execute-api.${AWS::Region}.amazonaws.com'
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              HTTPSPort: 443
          - Id: origin-1
            DomainName: !Sub '${OriginApi1}.execute-api.${AWS::Region}.amazonaws.com'
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              HTTPSPort: 443
          - Id: origin-2
            DomainName: !Sub '${OriginApi2}.execute-api.${AWS::Region}.amazonaws.com'
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              HTTPSPort: 443

  # ═══════════════════════════════════════════════════════════════════════════════
  # Failover Lambda — triggered by alarm, updates KVS
  # Requires botocore[crt] layer (see README)
  # ═══════════════════════════════════════════════════════════════════════════════
  FailoverLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-failover-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: failover-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
                Resource: '*'
              - Effect: Allow
                Action: [cloudfront-keyvaluestore:PutKey, cloudfront-keyvaluestore:DescribeKeyValueStore]
                Resource: !GetAtt RoutingKVS.Arn
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref AlertTopic

  FailoverFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-failover'
      Runtime: python3.9
      Architectures: [arm64]
      Handler: index.handler
      Role: !GetAtt FailoverLambdaRole.Arn
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          KVS_ARN: !GetAtt RoutingKVS.Arn
          SNS_TOPIC: !Ref AlertTopic
      Code:
        ZipFile: |
          import sys
          sys.path.insert(0, "/opt/python")
          import json, os, boto3
          KVS_ARN = os.environ["KVS_ARN"]
          SNS_TOPIC = os.environ["SNS_TOPIC"]
          kvs = boto3.client("cloudfront-keyvaluestore")
          sns = boto3.client("sns")

          def handler(event, context):
              for record in event.get("Records", []):
                  message = json.loads(record["Sns"]["Message"])
                  alarm_name = message.get("AlarmName", "")
                  new_state = message.get("NewStateValue", "")
                  origin_id = None
                  for i in ["0", "1", "2"]:
                      if f"origin-{i}" in alarm_name:
                          origin_id = i
                          break
                  if origin_id is None:
                      print(f"Cannot extract origin from: {alarm_name}")
                      return
                  enabled = (new_state == "OK")
                  try:
                      desc = kvs.describe_key_value_store(KvsARN=KVS_ARN)
                      kvs.put_key(KvsARN=KVS_ARN, Key=f"origin_{origin_id}_enabled", Value=str(enabled).lower(), IfMatch=desc["ETag"])
                      action = "ENABLED" if enabled else "DISABLED"
                      msg = f"Origin {origin_id} {action} (alarm: {new_state})"
                      print(msg)
                      sns.publish(TopicArn=SNS_TOPIC, Subject=f"[Geo-Routing] Origin {origin_id} {action}", Message=msg)
                  except Exception as e:
                      print(f"Error: {e}")
                      raise

  FailoverPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref FailoverFunction
      Action: lambda:InvokeFunction
      Principal: sns.amazonaws.com
      SourceArn: !Ref AlertTopic

  FailoverSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlertTopic
      Protocol: lambda
      Endpoint: !GetAtt FailoverFunction.Arn

  # ═══════════════════════════════════════════════════════════════════════════════
  # Synthetics Canaries — health check each origin every 60s (internal invoke)
  # ═══════════════════════════════════════════════════════════════════════════════
  CanaryRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-canary-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: canary-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
                Resource: '*'
              - Effect: Allow
                Action: [s3:PutObject, s3:GetObject]
                Resource: !Sub '${CanaryArtifactsBucket.Arn}/*'
              - Effect: Allow
                Action: [s3:GetBucketLocation, s3:ListBucket]
                Resource: !GetAtt CanaryArtifactsBucket.Arn
              - Effect: Allow
                Action: cloudwatch:PutMetricData
                Resource: '*'
                Condition:
                  StringEquals:
                    cloudwatch:namespace: CloudWatchSynthetics
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource:
                  - !GetAtt Origin0Function.Arn
                  - !GetAtt Origin1Function.Arn
                  - !GetAtt Origin2Function.Arn

  CanaryOrigin0:
    Type: AWS::Synthetics::Canary
    Properties:
      Name: !Sub '${ProjectName}-origin-0'
      RuntimeVersion: syn-nodejs-puppeteer-9.1
      ArtifactS3Location: !Sub 's3://${CanaryArtifactsBucket}/${ProjectName}-origin-0'
      ExecutionRoleArn: !GetAtt CanaryRole.Arn
      Schedule:
        Expression: rate(1 minute)
      StartCanaryAfterCreation: true
      RunConfig:
        TimeoutInSeconds: 15
      Code:
        Handler: index.handler
        Script: !Sub |
          const synthetics = require('Synthetics');
          const log = require('SyntheticsLogger');
          const { LambdaClient, InvokeCommand } = require('@aws-sdk/client-lambda');
          const lambda = new LambdaClient({});
          exports.handler = async () => {
            log.info('Health check: origin 0');
            const res = await lambda.send(new InvokeCommand({
              FunctionName: '${Origin0Function}',
              Payload: JSON.stringify({ rawPath: '/health', headers: {} })
            }));
            const payload = JSON.parse(new TextDecoder().decode(res.Payload));
            if (payload.statusCode !== 200) throw new Error('Origin 0 unhealthy: HTTP ' + payload.statusCode);
            log.info('Origin 0 healthy');
          };

  CanaryOrigin1:
    Type: AWS::Synthetics::Canary
    Properties:
      Name: !Sub '${ProjectName}-origin-1'
      RuntimeVersion: syn-nodejs-puppeteer-9.1
      ArtifactS3Location: !Sub 's3://${CanaryArtifactsBucket}/${ProjectName}-origin-1'
      ExecutionRoleArn: !GetAtt CanaryRole.Arn
      Schedule:
        Expression: rate(1 minute)
      StartCanaryAfterCreation: true
      RunConfig:
        TimeoutInSeconds: 15
      Code:
        Handler: index.handler
        Script: !Sub |
          const synthetics = require('Synthetics');
          const log = require('SyntheticsLogger');
          const { LambdaClient, InvokeCommand } = require('@aws-sdk/client-lambda');
          const lambda = new LambdaClient({});
          exports.handler = async () => {
            log.info('Health check: origin 1');
            const res = await lambda.send(new InvokeCommand({
              FunctionName: '${Origin1Function}',
              Payload: JSON.stringify({ rawPath: '/health', headers: {} })
            }));
            const payload = JSON.parse(new TextDecoder().decode(res.Payload));
            if (payload.statusCode !== 200) throw new Error('Origin 1 unhealthy: HTTP ' + payload.statusCode);
            log.info('Origin 1 healthy');
          };

  CanaryOrigin2:
    Type: AWS::Synthetics::Canary
    Properties:
      Name: !Sub '${ProjectName}-origin-2'
      RuntimeVersion: syn-nodejs-puppeteer-9.1
      ArtifactS3Location: !Sub 's3://${CanaryArtifactsBucket}/${ProjectName}-origin-2'
      ExecutionRoleArn: !GetAtt CanaryRole.Arn
      Schedule:
        Expression: rate(1 minute)
      StartCanaryAfterCreation: true
      RunConfig:
        TimeoutInSeconds: 15
      Code:
        Handler: index.handler
        Script: !Sub |
          const synthetics = require('Synthetics');
          const log = require('SyntheticsLogger');
          const { LambdaClient, InvokeCommand } = require('@aws-sdk/client-lambda');
          const lambda = new LambdaClient({});
          exports.handler = async () => {
            log.info('Health check: origin 2');
            const res = await lambda.send(new InvokeCommand({
              FunctionName: '${Origin2Function}',
              Payload: JSON.stringify({ rawPath: '/health', headers: {} })
            }));
            const payload = JSON.parse(new TextDecoder().decode(res.Payload));
            if (payload.statusCode !== 200) throw new Error('Origin 2 unhealthy: HTTP ' + payload.statusCode);
            log.info('Origin 2 healthy');
          };

  # ═══════════════════════════════════════════════════════════════════════════════
  # CloudWatch Alarms — trigger failover on canary failure
  # ═══════════════════════════════════════════════════════════════════════════════
  CanaryAlarmOrigin0:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-canary-alarm-origin-0'
      AlarmDescription: Origin 0 health failures
      Namespace: CloudWatchSynthetics
      MetricName: SuccessPercent
      Dimensions:
        - Name: CanaryName
          Value: !Ref CanaryOrigin0
      Statistic: Average
      Period: !Ref CanaryEvaluationPeriod
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: LessThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertTopic]
      OKActions: [!Ref AlertTopic]

  CanaryAlarmOrigin1:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-canary-alarm-origin-1'
      AlarmDescription: Origin 1 health failures
      Namespace: CloudWatchSynthetics
      MetricName: SuccessPercent
      Dimensions:
        - Name: CanaryName
          Value: !Ref CanaryOrigin1
      Statistic: Average
      Period: !Ref CanaryEvaluationPeriod
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: LessThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertTopic]
      OKActions: [!Ref AlertTopic]

  CanaryAlarmOrigin2:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-canary-alarm-origin-2'
      AlarmDescription: Origin 2 health failures
      Namespace: CloudWatchSynthetics
      MetricName: SuccessPercent
      Dimensions:
        - Name: CanaryName
          Value: !Ref CanaryOrigin2
      Statistic: Average
      Period: !Ref CanaryEvaluationPeriod
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: LessThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertTopic]
      OKActions: [!Ref AlertTopic]

  # ═══════════════════════════════════════════════════════════════════════════════
  # Maintenance API — manual toggle via API Gateway HTTP API
  # ═══════════════════════════════════════════════════════════════════════════════
  MaintenanceApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${ProjectName}-maintenance-api'
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins: ['*']
        AllowMethods: [POST, OPTIONS]
        AllowHeaders: [content-type]

  MaintenanceApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref MaintenanceApi
      StageName: '$default'
      AutoDeploy: true

  MaintenanceIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref MaintenanceApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt MaintenanceFunction.Arn
      PayloadFormatVersion: '2.0'

  MaintenanceRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref MaintenanceApi
      RouteKey: POST /maintenance
      Target: !Sub 'integrations/${MaintenanceIntegration}'

  MaintenanceFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-maintenance-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: maintenance-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
                Resource: '*'
              - Effect: Allow
                Action: [cloudfront-keyvaluestore:PutKey, cloudfront-keyvaluestore:DescribeKeyValueStore]
                Resource: !GetAtt RoutingKVS.Arn
              - Effect: Allow
                Action: ssm:PutParameter
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/geo-routing/*'

  MaintenanceFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-maintenance'
      Runtime: python3.9
      Architectures: [arm64]
      Handler: index.handler
      Role: !GetAtt MaintenanceFunctionRole.Arn
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          KVS_ARN: !GetAtt RoutingKVS.Arn
      Code:
        ZipFile: |
          import sys
          sys.path.insert(0, "/opt/python")
          import json, os, boto3
          KVS_ARN = os.environ["KVS_ARN"]
          kvs = boto3.client("cloudfront-keyvaluestore")
          ssm = boto3.client("ssm")
          def handler(event, context):
              try:
                  body = json.loads(event.get("body", "{}"))
                  origin_id = str(body.get("originId", ""))
                  enabled = body.get("enabled")
                  if not origin_id or enabled is None:
                      return {"statusCode": 400, "body": json.dumps({"error": "originId and enabled required"})}
                  ssm.put_parameter(Name=f"/geo-routing/origin-{origin_id}-healthy", Value=str(enabled).lower(), Type="String", Overwrite=True)
                  desc = kvs.describe_key_value_store(KvsARN=KVS_ARN)
                  kvs.put_key(KvsARN=KVS_ARN, Key=f"origin_{origin_id}_enabled", Value=str(enabled).lower(), IfMatch=desc["ETag"])
                  return {"statusCode": 200, "headers": {"content-type": "application/json", "access-control-allow-origin": "*"}, "body": json.dumps({"ok": True, "originId": origin_id, "enabled": enabled})}
              except Exception as e:
                  return {"statusCode": 500, "body": json.dumps({"error": str(e)})}

  MaintenanceFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MaintenanceFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${MaintenanceApi}/*'

Outputs:
  DistributionUrl:
    Description: CloudFront distribution URL
    Value: !Sub 'https://${GeoRoutingDistribution.DomainName}'

  DistributionId:
    Description: CloudFront Distribution ID
    Value: !Ref GeoRoutingDistribution

  MaintenanceApiUrl:
    Description: Maintenance API endpoint
    Value: !Sub 'https://${MaintenanceApi}.execute-api.${AWS::Region}.amazonaws.com/maintenance'

  KvsArn:
    Description: Key Value Store ARN
    Value: !GetAtt RoutingKVS.Arn

  AlertTopicArn:
    Description: SNS topic for alerts
    Value: !Ref AlertTopic

  CanaryArtifactsBucketName:
    Description: Canary artifacts bucket
    Value: !Ref CanaryArtifactsBucket

  TestPageUrl:
    Description: Test page URL
    Value: !Sub 'https://${GeoRoutingDistribution.DomainName}/test'
