version: 0.2
phases:
  pre_build:
    commands:
      - echo Logging in to ECR...
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 033216807884.dkr.ecr.us-east-1.amazonaws.com
  install:
    commands:
      - docker buildx create --use
      - docker run --privileged --rm tonistiigi/binfmt --install arm64
  build:
    commands:
      - echo Building ARM64 image...
      - cd $CODEBUILD_SRC_DIR
      - docker buildx build --platform linux/arm64 -t 033216807884.dkr.ecr.us-east-1.amazonaws.com/hybrid-edge-obs/payment-api:latest --load .
  post_build:
    commands:
      - echo Pushing image...
      - docker push 033216807884.dkr.ecr.us-east-1.amazonaws.com/hybrid-edge-obs/payment-api:latest
