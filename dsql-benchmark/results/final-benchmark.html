<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurora DSQL Benchmark Report</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #1a1f2e 0%, #16213e 100%);
      border-bottom: 1px solid #2d3748;
      padding: 2rem 3rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .aws-logo {
      width: 48px; height: 48px;
      background: #FF9900;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: 900; color: #0f1117;
    }
    .header-text h1 { font-size: 1.6rem; font-weight: 700; color: #fff; }
    .header-text p { color: #718096; font-size: 0.9rem; margin-top: 0.25rem; }
    .badge {
      margin-left: auto;
      background: #2d3748;
      border: 1px solid #4a5568;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
      color: #a0aec0;
    }
    .badge strong { color: #63b3ed; }
    
    main { padding: 2rem 3rem; max-width: 1400px; margin: 0 auto; }
    
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    .summary-card {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
    }
    .summary-card .label { font-size: 0.75rem; color: #718096; text-transform: uppercase; letter-spacing: 0.05em; }
    .summary-card .value { font-size: 1.5rem; font-weight: 700; color: #fff; margin-top: 0.25rem; }
    .summary-card .sub { font-size: 0.8rem; color: #4a5568; margin-top: 0.25rem; }
    .summary-card.single .value { color: #63b3ed; }
    .summary-card.multi .value { color: #68d391; }
    
    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section-title::before {
      content: '';
      display: block;
      width: 4px; height: 1.2em;
      background: #FF9900;
      border-radius: 2px;
    }
    
    .workload-section {
      margin-bottom: 3rem;
    }
    
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
      gap: 1.5rem;
    }
    
    .chart-card {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 1.5rem;
    }
    .chart-card h3 {
      font-size: 0.9rem;
      font-weight: 600;
      color: #a0aec0;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .chart-container { position: relative; height: 220px; }
    
    .legend {
      display: flex;
      gap: 1.5rem;
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: #718096;
    }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    .legend-dot.single { background: #63b3ed; }
    .legend-dot.multi { background: #68d391; }
    
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid #2d3748;
      padding-bottom: 0;
    }
    .tab {
      padding: 0.6rem 1.2rem;
      border-radius: 8px 8px 0 0;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      border-bottom: none;
      color: #718096;
      background: transparent;
      transition: all 0.15s;
    }
    .tab:hover { color: #e2e8f0; background: #1a1f2e; }
    .tab.active {
      color: #fff;
      background: #1a1f2e;
      border-color: #2d3748;
      border-bottom-color: #1a1f2e;
      margin-bottom: -1px;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    footer {
      text-align: center;
      padding: 2rem;
      color: #4a5568;
      font-size: 0.8rem;
      border-top: 1px solid #2d3748;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="aws-logo">⚡</div>
    <div class="header-text">
      <h1>Aurora DSQL Benchmark Report</h1>
      <p>TPC-C workload — Single-Region vs Multi-Region latency comparison</p>
    </div>
    <div class="badge">Generated: <strong>4/30/2026, 7:05:00 AM</strong></div>
  </header>
  
  <main>
    <div id="summary-section">
      <div class="summary-grid" id="summary-cards"></div>
    </div>
    
    <div class="tabs" id="workload-tabs"></div>
    <div id="workload-panels"></div>
  </main>
  
  <footer>Aurora DSQL Benchmark — All latencies in milliseconds</footer>
  
  <script>
    const CHARTS = [{"wl":"select","metric":"p50","singleData":[3,3],"multiData":[3,3]},{"wl":"select","metric":"p95","singleData":[4,4],"multiData":[3,3]},{"wl":"select","metric":"p99","singleData":[90,4],"multiData":[23,4]},{"wl":"select","metric":"avg","singleData":[4.18,3.35],"multiData":[2.97,2.92]},{"wl":"insert","metric":"p50","singleData":[10,10],"multiData":[88,88]},{"wl":"insert","metric":"p95","singleData":[11,11],"multiData":[89,89]},{"wl":"insert","metric":"p99","singleData":[60,11],"multiData":[116,90]},{"wl":"insert","metric":"avg","singleData":[10.18,9.56],"multiData":[87.58,86.48]},{"wl":"update","metric":"p50","singleData":[10,11],"multiData":[89,89]},{"wl":"update","metric":"p95","singleData":[11,11],"multiData":[91,91]},{"wl":"update","metric":"p99","singleData":[12,12],"multiData":[106,92]},{"wl":"update","metric":"avg","singleData":[9.97,10.69],"multiData":[89.54,89.57]}];
    const COUNTS = [100,1000];
    const RESULTS = {"timestamp":"2026-04-30T07:05:00.834Z","config":{"workloads":["select","insert","update"],"counts":[100,1000]},"singleRegion":{"select":{"100":{"count":100,"min":3,"max":90,"avg":4.18,"p50":3,"p95":4,"p99":90},"1000":{"count":1000,"min":3,"max":30,"avg":3.354,"p50":3,"p95":4,"p99":4}},"insert":{"100":{"count":100,"min":3,"max":60,"avg":10.18,"p50":10,"p95":11,"p99":60},"1000":{"count":1000,"min":3,"max":36,"avg":9.559,"p50":10,"p95":11,"p99":11}},"update":{"100":{"count":100,"min":9,"max":12,"avg":9.97,"p50":10,"p95":11,"p99":12},"1000":{"count":1000,"min":9,"max":20,"avg":10.687,"p50":11,"p95":11,"p99":12}}},"multiRegion":{"select":{"100":{"count":100,"min":2,"max":23,"avg":2.97,"p50":3,"p95":3,"p99":23},"1000":{"count":1000,"min":2,"max":28,"avg":2.915,"p50":3,"p95":3,"p99":4}},"insert":{"100":{"count":100,"min":3,"max":116,"avg":87.58,"p50":88,"p95":89,"p99":116},"1000":{"count":1000,"min":3,"max":288,"avg":86.479,"p50":88,"p95":89,"p99":90}},"update":{"100":{"count":100,"min":88,"max":106,"avg":89.54,"p50":89,"p95":91,"p99":106},"1000":{"count":1000,"min":88,"max":126,"avg":89.569,"p50":89,"p95":91,"p99":92}}}};
    
    const WORKLOADS = [...new Set(CHARTS.map(c => c.wl))];
    const METRICS = ['avg', 'p50', 'p95', 'p99'];
    const METRIC_LABELS = { avg: 'Average', p50: 'P50 Median', p95: 'P95', p99: 'P99' };
    
    Chart.defaults.color = '#718096';
    Chart.defaults.borderColor = '#2d3748';
    
    // Summary cards
    const summaryEl = document.getElementById('summary-cards');
    function getAvgLatency(clusterResults, wl, metric) {
      if (!clusterResults[wl]) return null;
      const vals = Object.values(clusterResults[wl]).filter(d => d && !d.error && d[metric] != null);
      if (!vals.length) return null;
      return vals.reduce((a, b) => a + b[metric], 0) / vals.length;
    }
    
    const summaryData = [];
    for (const wl of WORKLOADS) {
      const sAvg = getAvgLatency(RESULTS.singleRegion || {}, wl, 'avg');
      const mAvg = getAvgLatency(RESULTS.multiRegion || {}, wl, 'avg');
      summaryData.push({ wl, sAvg, mAvg });
    }
    
    summaryData.forEach(({ wl, sAvg, mAvg }) => {
      const diff = (sAvg && mAvg) ? ((mAvg - sAvg) / sAvg * 100).toFixed(1) : null;
      summaryEl.innerHTML += `
        <div class="summary-card single">
          <div class="label">${wl.toUpperCase()} · Single-Region</div>
          <div class="value">${sAvg ? sAvg.toFixed(1) + ' ms' : 'N/A'}</div>
          <div class="sub">avg latency (all counts)</div>
        </div>
        <div class="summary-card multi">
          <div class="label">${wl.toUpperCase()} · Multi-Region</div>
          <div class="value">${mAvg ? mAvg.toFixed(1) + ' ms' : 'N/A'}</div>
          <div class="sub">${diff ? (diff > 0 ? '+' + diff + '% vs single' : diff + '% vs single') : 'avg latency'}</div>
        </div>
      `;
    });
    
    // Tabs
    const tabsEl = document.getElementById('workload-tabs');
    const panelsEl = document.getElementById('workload-panels');
    
    WORKLOADS.forEach((wl, idx) => {
      tabsEl.innerHTML += `<button class="tab ${idx===0?'active':''}" onclick="switchTab('${wl}')" id="tab-${wl}">${wl.toUpperCase()}</button>`;
      
      const panel = document.createElement('div');
      panel.className = 'tab-content' + (idx === 0 ? ' active' : '');
      panel.id = 'panel-' + wl;
      
      panel.innerHTML = `
        <div class="workload-section">
          <div class="section-title">${wl.toUpperCase()} Latency by Record Count</div>
          <div class="charts-grid" id="charts-${wl}"></div>
        </div>
      `;
      panelsEl.appendChild(panel);
      
      // Create one chart per metric
      METRICS.forEach(metric => {
        const chartData = CHARTS.find(c => c.wl === wl && c.metric === metric);
        if (!chartData) return;
        
        const card = document.createElement('div');
        card.className = 'chart-card';
        const canvasId = `chart-${wl}-${metric}`;
        card.innerHTML = `
          <h3>${METRIC_LABELS[metric]} Latency (ms)</h3>
          <div class="chart-container"><canvas id="${canvasId}"></canvas></div>
          <div class="legend">
            <div class="legend-item"><div class="legend-dot single"></div> Single-Region (us-east-1)</div>
            <div class="legend-item"><div class="legend-dot multi"></div> Multi-Region (us-east-1 + us-west-2)</div>
          </div>
        `;
        document.getElementById('charts-' + wl).appendChild(card);
        
        new Chart(document.getElementById(canvasId), {
          type: 'bar',
          data: {
            labels: COUNTS.map(c => c + ' ops'),
            datasets: [
              {
                label: 'Single-Region',
                data: chartData.singleData,
                backgroundColor: 'rgba(99, 179, 237, 0.7)',
                borderColor: '#63b3ed',
                borderWidth: 1,
                borderRadius: 4,
              },
              {
                label: 'Multi-Region',
                data: chartData.multiData,
                backgroundColor: 'rgba(104, 211, 145, 0.7)',
                borderColor: '#68d391',
                borderWidth: 1,
                borderRadius: 4,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y?.toFixed(2)} ms`,
                },
              },
            },
            scales: {
              x: { grid: { color: '#2d3748' } },
              y: {
                grid: { color: '#2d3748' },
                ticks: { callback: v => v + ' ms' },
                beginAtZero: true,
              },
            },
          },
        });
      });
    });
    
    function switchTab(wl) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(p => p.classList.remove('active'));
      document.getElementById('tab-' + wl).classList.add('active');
      document.getElementById('panel-' + wl).classList.add('active');
    }
  </script>
</body>
</html>
